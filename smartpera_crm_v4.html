<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ad Astra CRM">
<meta name="theme-color" content="#1a3c8f">
<title>Ad Astra CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1a3c8f;--navy-dark:#102464;--navy-light:#2a52b0;
  --gold:#f0a500;--gold-light:#fff3cc;--gold-dark:#c47f00;
  --white:#fff;--gray-50:#f8f9fc;--gray-100:#eef0f6;
  --gray-300:#d0d5e8;--gray-500:#7a84a8;--gray-700:#3d4466;--gray-900:#1a1e33;
  --green:#16a34a;--green-light:#dcfce7;--red:#dc2626;--orange:#f47920;
  --radius:14px;--radius-sm:9px;
  --shadow:0 2px 16px rgba(26,60,143,0.10);--shadow-lg:0 8px 32px rgba(26,60,143,0.18);
}
body{font-family:"DM Sans",sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh;max-width:768px;margin:0 auto}
.login-screen{min-height:100vh;background:linear-gradient(160deg,var(--navy-dark) 0%,var(--navy) 60%,var(--navy-light) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.login-logo{width:100px;height:100px;object-fit:contain;margin-bottom:10px;border-radius:16px;background:white;padding:8px}
.login-brand{font-size:24px;font-weight:700;color:var(--white);letter-spacing:-0.5px;margin-bottom:4px}
.login-sub{font-size:13px;color:rgba(255,255,255,0.55);margin-bottom:32px}
.login-card{background:var(--white);border-radius:20px;padding:26px 22px;width:100%;max-width:360px;box-shadow:var(--shadow-lg)}
.login-label{font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:7px;display:block}
.login-select{width:100%;padding:13px 16px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:15px;font-family:"DM Sans",sans-serif;color:var(--gray-900);background:var(--white);margin-bottom:16px;outline:none;appearance:none}
.login-select:focus{border-color:var(--navy)}
.pin-row{display:flex;gap:10px;justify-content:center;margin-bottom:18px}
.pin-dot{width:52px;height:58px;border:2px solid var(--gray-300);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--navy);transition:all 0.15s;background:var(--gray-50)}
.pin-dot.filled{border-color:var(--navy);background:var(--navy);color:var(--white)}
.pin-dot.error{border-color:var(--red);background:#fef2f2}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
.num-btn{padding:15px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:20px;font-weight:500;color:var(--gray-900);background:var(--white);cursor:pointer;font-family:"DM Sans",sans-serif;transition:all 0.1s;text-align:center}
.num-btn:active{background:var(--gray-100);transform:scale(0.96)}
.login-err{font-size:13px;color:var(--red);text-align:center;min-height:18px;margin-top:4px}
.sync-indicator{position:fixed;top:12px;right:12px;z-index:999;background:var(--navy);color:white;font-size:11px;font-weight:600;padding:5px 10px;border-radius:20px;opacity:0;transition:opacity 0.3s;pointer-events:none}
.sync-indicator.show{opacity:1}
.sync-indicator.synced{background:var(--green)}
.sync-indicator.error{background:var(--red)}
.app{display:none}
.header{background:var(--navy);padding:50px 20px 16px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hlogo{display:flex;align-items:center;gap:10px}
.hlogo img{width:34px;height:34px;border-radius:8px;background:white;object-fit:contain;padding:3px}
.hname{font-size:15px;font-weight:600;color:var(--white)}
.hrole{font-size:11px;color:rgba(255,255,255,0.5);margin-top:1px}
.icon-btn{width:36px;height:36px;border-radius:9px;border:none;background:rgba(255,255,255,0.12);color:var(--white);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:6px}
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.kpi-card{background:rgba(255,255,255,0.1);border-radius:10px;padding:11px 13px}
.kpi-label{font-size:10px;color:rgba(255,255,255,0.6);font-weight:500;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.kpi-val{font-size:20px;font-weight:700;color:var(--white)}
.kpi-sub{font-size:10px;color:rgba(255,255,255,0.45);margin-top:2px}
.kpi-prog{height:3px;background:rgba(255,255,255,0.15);border-radius:2px;margin-top:7px;overflow:hidden}
.kpi-bar{height:100%;background:var(--gold);border-radius:2px}
.nav-tabs{background:var(--navy);border-bottom:1px solid rgba(255,255,255,0.1);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 20px}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:10px 15px 9px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.5);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;flex-shrink:0;transition:all 0.2s}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.content{padding:16px 16px 100px}
.search-input{width:100%;padding:11px 14px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;font-family:"DM Sans",sans-serif;color:var(--gray-900);background:var(--white);outline:none;margin-bottom:11px}
.search-input:focus{border-color:var(--navy)}
.chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:13px;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:1.5px solid var(--gray-300);background:var(--white);color:var(--gray-500);transition:all 0.15s;flex-shrink:0}
.chip.active{background:var(--navy);color:var(--white);border-color:var(--navy)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-box{background:var(--white);border-radius:var(--radius-sm);padding:11px;box-shadow:var(--shadow);text-align:center}
.stat-num{font-size:20px;font-weight:700;color:var(--navy)}
.stat-lbl{font-size:10px;color:var(--gray-500);margin-top:2px;font-weight:500}
.lead-card{background:var(--white);border-radius:var(--radius);padding:13px 15px;margin-bottom:9px;box-shadow:var(--shadow);cursor:pointer;transition:transform 0.12s;border-left:4px solid var(--gray-300)}
.lead-card:active{transform:scale(0.985)}
.lc-new-lead{border-left-color:#94a3b8}.lc-contacted{border-left-color:#818cf8}.lc-potential{border-left-color:var(--gold)}.lc-met{border-left-color:#38bdf8}.lc-proposed{border-left-color:var(--navy)}.lc-closed{border-left-color:var(--green)}.lc-rejected{border-left-color:var(--red)}
.lead-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}
.lead-name{font-size:15px;font-weight:600;color:var(--gray-900)}
.lead-prof{font-size:12px;color:var(--gray-500);margin-top:2px}
.sb{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.sb-new-lead{background:#f1f5f9;color:#64748b}.sb-contacted{background:#eef2ff;color:#4338ca}.sb-potential{background:var(--gold-light);color:#92400e}.sb-met{background:#e0f2fe;color:#0369a1}.sb-proposed{background:#e8eefb;color:var(--navy-dark)}.sb-closed{background:var(--green-light);color:#15803d}.sb-rejected{background:#fee2e2;color:var(--red)}
.lead-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tag{font-size:11px;background:var(--gray-100);color:var(--gray-500);padding:2px 8px;border-radius:20px}
.lead-footer{display:flex;align-items:center;justify-content:space-between}
.lead-fyc{font-size:13px;font-weight:700;color:var(--green)}
.wa-btn{background:#25d366;color:white;border:none;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif}
.empty{text-align:center;padding:52px 24px;color:var(--gray-500)}
.chart-card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:13px}
.chart-title{font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:13px}
.chart-wrap{position:relative;height:200px}
.chart-wrap-tall{position:relative;height:240px}
.target-card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:13px}
.target-prog{height:10px;background:var(--gray-100);border-radius:5px;overflow:hidden;margin:10px 0 6px}
.target-bar{height:100%;background:linear-gradient(90deg,var(--navy),var(--gold));border-radius:5px;transition:width 0.5s}
.insight-card{background:linear-gradient(135deg,var(--navy-dark),var(--navy));border-radius:var(--radius);padding:16px;margin-bottom:13px;color:white}
.insight-title{font-size:11px;font-weight:600;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
.insight-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:9px;font-size:13px;line-height:1.5;color:rgba(255,255,255,0.9)}
.insight-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);margin-top:5px;flex-shrink:0}
.motive-card{background:linear-gradient(135deg,var(--navy-dark),var(--navy));border-radius:var(--radius);padding:18px;margin-bottom:13px;border-left:4px solid var(--gold)}
.streak-card{background:var(--white);border-radius:var(--radius);padding:13px 15px;box-shadow:var(--shadow);margin-bottom:13px;display:flex;align-items:center;gap:13px}
.agent-row{background:var(--white);border-radius:var(--radius);padding:13px 15px;box-shadow:var(--shadow);margin-bottom:9px}
.agent-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:8px}
.agt-val{font-size:16px;font-weight:700;color:var(--navy);text-align:center}
.agt-lbl{font-size:10px;color:var(--gray-500);margin-top:1px;text-align:center}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:768px;max-height:92vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--gray-300);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:18px;font-weight:700;color:var(--gray-900);margin-bottom:18px}
.modal-hdr-navy{background:var(--navy);margin:-24px -20px 18px;padding:24px 20px 20px;border-radius:24px 24px 0 0}
.fg{margin-bottom:13px}
.fl{font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;display:block}
.fi,.fs,.ft{width:100%;padding:11px 14px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;font-family:"DM Sans",sans-serif;color:var(--gray-900);background:var(--white);outline:none;transition:border-color 0.2s;appearance:none}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--navy)}
.ft{min-height:80px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stage-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:6px}
.stg-btn{padding:10px;border:1.5px solid #d0d5e8;border-radius:9px;font-size:12px;font-weight:500;color:#3d4466;background:white !important;cursor:pointer;text-align:center;font-family:"DM Sans",sans-serif;transition:all 0.15s}
.stg-btn.sel{border-color:var(--navy);background:#e8eefb;color:var(--navy-dark);font-weight:600}
.btn-primary{width:100%;padding:14px;background:var(--navy);color:var(--white);border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;font-family:"DM Sans",sans-serif;cursor:pointer;margin-top:7px}
.btn-secondary{width:100%;padding:12px;background:var(--white);color:var(--gray-700);border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;font-weight:500;font-family:"DM Sans",sans-serif;cursor:pointer;margin-top:7px}
.btn-danger{width:100%;padding:12px;background:#fee2e2;color:var(--red);border:1.5px solid #fecaca;border-radius:var(--radius-sm);font-size:14px;font-weight:500;font-family:"DM Sans",sans-serif;cursor:pointer;margin-top:7px}
.btn-gold{width:100%;padding:12px;background:var(--gold);color:var(--navy-dark);border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:"DM Sans",sans-serif;cursor:pointer;margin-top:7px}
.dr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--gray-100)}
.dr:last-child{border-bottom:none}
.dk{font-size:13px;color:var(--gray-500)}
.dv{font-size:13px;font-weight:600;color:var(--gray-900);text-align:right}
.settings-item{background:var(--white);border-radius:var(--radius-sm);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer}
.green-light{background:#dcfce7}
.orange-light{background:#fff0e6}
.sb-follow-up{background:var(--gold-light,#fff3cc);color:#92400e}
.lc-follow-up{border-left-color:var(--gold,#f0a500)}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:768px;background:var(--white);border-top:1px solid var(--gray-100);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -4px 20px rgba(26,60,143,0.08)}
.bn-item{flex:1;padding:11px 0 9px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--gray-500);font-size:10px;font-weight:500;transition:color 0.2s}
.bn-item.active{color:var(--navy)}
.bn-icon{font-size:20px;line-height:1}
.loading-screen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;color:white}
.loading-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.offline-banner{background:var(--orange);color:white;font-size:12px;font-weight:600;padding:6px 16px;text-align:center;display:none}
.offline-banner.show{display:block}
@media(min-width:600px){.stats-grid{grid-template-columns:repeat(6,1fr)}.kpi-row{grid-template-columns:repeat(4,1fr)}.agent-stats{grid-template-columns:repeat(6,1fr)}}
</style>

<script>


// Ad Astra CRM v4.1 - Clean rebuild, zero async/await, localStorage-first
var FB = "https://smartpera-crm-default-rtdb.asia-southeast1.firebasedatabase.app";
var QUOTE = "Do what you gotta do so you can do what you wanna do in life. It's all about daily consistent action.";
var MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var STAGES = ["New Lead","Contacted","Follow Up","Met","Proposed","Closed","Rejected"];
var CASE_TYPES = ["Pure Investment","Life Insurance","Critical Illness","Hospital Insurance","Accident","Savings"];
var SOURCES = ["TikTok","Facebook","Scorecard","Website","Referral","Event","Others"];
var STAGE_COLORS = {"New Lead":"#94a3b8","Contacted":"#818cf8","Follow Up":"#f0a500","Met":"#38bdf8","Proposed":"var(--gold)","Closed":"#16a34a","Rejected":"#dc2626"};

var DEFAULT_USERS = {
  medz:{name:"Medz Ron Macasaet",role:"Manager · SP-Ad Astra",pin:"0808",master:true},
  john:{name:"John Perry Espino",role:"Financial Consultant",pin:"6854",master:false},
  marvin:{name:"Marvin De Villa",role:"Financial Consultant",pin:"8031",master:false},
  jeni:{name:"Jeni Oh",role:"Financial Consultant",pin:"7328",master:false},
  pamela:{name:"Pamela Quinto",role:"Financial Consultant",pin:"9032",master:false},
  betty:{name:"Betty Nicole Bontigao",role:"Financial Consultant",pin:"3579",master:false}
};

// ── FIREBASE (promise-based, never blocking) ──────────────────────────
function fbGet(p){return fetch(FB+"/"+p+".json").then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});}
function fbSet(p,d){return fetch(FB+"/"+p+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}).then(function(r){return r.ok;}).catch(function(){return false;});}
function fbPush(p,d){return fetch(FB+"/"+p+".json",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}).then(function(r){return r.ok?r.json().then(function(j){return j.name;}):null;}).catch(function(){return null;});}
function fbDelete(p){return fetch(FB+"/"+p+".json",{method:"DELETE"}).then(function(){return true;}).catch(function(){return false;});}

// ── LOCALSTORAGE ──────────────────────────────────────────────────────
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function lsGet(k,def){try{var v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch(e){return def;}}
function saveLeads(uid,arr){lsSet("sp_leads_"+uid,arr);}
function migrateLead(l){
  // Map old field names to new ones
  if(!l._id)l._id=l._fbKey||l.id||genId();
  if(!l.lc&&l.lastContacted)l.lc=l.lastContacted;
  if(!l.fuDate&&l.followUpDate)l.fuDate=l.followUpDate;
  if(!l.refs&&l.referrals)l.refs=l.referrals;
  if(!l.cases&&l.caseTypes)l.cases=l.caseTypes;
  if(!l.mk&&l.monthKey)l.mk=l.monthKey;
  if(!l.refNames&&l.referralNames)l.refNames=l.referralNames;
  if(!l.nextAction&&l.nextaction)l.nextAction=l.nextaction;
  if(!getLc(l))l.lc=l.updated?l.updated.split("T")[0]:todayStr();
  if(!l.cases)l.cases=[];
  if(!l.refs)l.refs="0";
  return l;
}
function loadLeadsLS(uid){
  var arr=lsGet("sp_leads_"+uid,[]);
  return arr.map(migrateLead);
}
function saveSettings(uid,obj){lsSet("sp_settings_"+uid,obj);settingsCache[uid]=obj;fbSet("settings/"+uid,obj);}
function loadSettingsLS(uid){return lsGet("sp_settings_"+uid,{});}
function saveRegistry(){lsSet("sp_registry",REGISTRY);fbSet("registry",REGISTRY);}
function loadRegistryLS(){var r=lsGet("sp_registry",null);if(r)REGISTRY=r;}

// ── STATE ─────────────────────────────────────────────────────────────
var REGISTRY = {users:JSON.parse(JSON.stringify(DEFAULT_USERS)),agentKeys:["medz","john","marvin","jeni","pamela","betty"]};
var leadsCache = {};
var settingsCache = {};
var pinBuf = "";
var curUser = null;
var curPage = "home";
var curStage = "New Lead";
var editKey = null;
var curFilter = "All";
var curSource = "All";
var curCase = "All";
var curLocation = "All";
var agentTab = "medz";
var charts = {};
var selCases = [];
var chartYear = new Date().getFullYear();
var syncTimer = null;

// ── HELPERS ───────────────────────────────────────────────────────────
function genId(){return "L"+Date.now().toString(36)+Math.random().toString(36).substr(2);}
function todayStr(){return new Date().toISOString().split("T")[0];}
function monthKey(){var d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1).toString().padStart(2,"0");}
function monthLabel(k){var p=k.split("-");return MONTHS[parseInt(p[1])-1]+" "+p[0].slice(2);}
function daysDiff(d){if(!d)return 9999;return Math.floor((Date.now()-new Date(d).getTime())/86400000);}
function daysUntil(d){if(!d)return 9999;return Math.floor((new Date(d).getTime()-Date.now())/86400000);}
function yearMonths(y){var m=[];for(var i=1;i<=12;i++)m.push(y+"-"+(i<10?"0":"")+i);return m;}
function availYears(){var s=new Set([chartYear,chartYear-1]);Object.values(leadsCache).forEach(function(a){a.forEach(function(l){if(l.mk)s.add(parseInt(l.mk.split("-")[0]));});});return Array.from(s).sort(function(a,b){return b-a;});}
function el(id){return document.getElementById(id);}
function showSync(msg,ok,err){
  var b=el("syncBar");if(!b)return;
  b.textContent=msg;b.style.display="block";
  b.style.background=ok?"#16a34a":err?"#dc2626":"var(--gold)";
  if(syncTimer)clearTimeout(syncTimer);
  syncTimer=setTimeout(function(){b.style.display="none";},2500);
}

// ── LEAD SCORE ────────────────────────────────────────────────────────
function getLc(l){return l.lc||l.lastContacted||(l.updated?l.updated.split("T")[0]:"");}
function getFuDate(l){return l.fuDate||l.followUpDate||"";}
function getLRefs(l){return parseInt(l.refs||l.referrals||0);}
function getLCases(l){return l.cases||l.caseTypes||[];}
function getLFyc(l){return parseFloat(l.fyc)||0;}
function score(l){
  var s=0;
  var inc=l.income||"";
  if(inc.indexOf("$5,000")>=0||inc.indexOf("Above")>=0)s+=3;
  else if(inc.indexOf("$3,500")>=0)s+=2;
  else if(inc.indexOf("$2,500")>=0)s+=1;
  if(l.stage==="Met"||l.stage==="Proposed")s+=3;
  else if(l.stage==="Contacted"||l.stage==="Follow Up")s+=2;
  else if(l.stage==="New Lead")s+=1;
  if(getLRefs(l)>0)s+=2;
  if(l.upsell==="High")s+=2;
  else if(l.upsell==="Medium")s+=1;
  var ds=daysDiff(getLc(l));
  if(ds>30)s-=2;else if(ds>14)s-=1;
  if(getLCases(l).length>1)s+=1;
  if(s>=7)return"Hot";if(s>=4)return"Warm";return"Cold";
}

// ── LEAD STORAGE ──────────────────────────────────────────────────────
function getLeads(uid){return leadsCache[uid]||[];}
function getSettings(uid){return settingsCache[uid]||{};}
function addLead(uid,lead){
  if(!leadsCache[uid])leadsCache[uid]=[];
  leadsCache[uid].push(lead);
  saveLeads(uid,leadsCache[uid]);
  fbPush("leads/"+uid,lead).then(function(fbk){
    if(fbk&&fbk!==lead._id){
      leadsCache[uid]=leadsCache[uid].map(function(x){return x._id===lead._id?Object.assign({},x,{_fbKey:fbk}):x;});
      saveLeads(uid,leadsCache[uid]);
    }
  });
}
function updateLead(uid,lead){
  leadsCache[uid]=leadsCache[uid].map(function(x){return x._id===lead._id?lead:x;});
  saveLeads(uid,leadsCache[uid]);
  var fbk=lead._fbKey;
  if(fbk){
    var d=Object.assign({},lead);delete d._id;delete d._fbKey;
    fbSet("leads/"+uid+"/"+fbk,d);
  }else{
    var d2=Object.assign({},lead);delete d2._id;delete d2._fbKey;
    fbPush("leads/"+uid,d2).then(function(newKey){
      if(newKey){
        leadsCache[uid]=leadsCache[uid].map(function(x){
          return x._id===lead._id?Object.assign({},x,{_fbKey:newKey}):x;
        });
        saveLeads(uid,leadsCache[uid]);
      }
    });
  }
}
function removeLead(uid,id){
  var lead=leadsCache[uid].find(function(x){return x._id===id;});
  leadsCache[uid]=leadsCache[uid].filter(function(x){return x._id!==id;});
  saveLeads(uid,leadsCache[uid]);
  if(lead&&lead._fbKey)fbDelete("leads/"+uid+"/"+lead._fbKey);
}

// ── REGISTRY ──────────────────────────────────────────────────────────
function buildDropdown(){
  var sel=el("userSelect");
  sel.innerHTML="<option value=''>Select your name</option>";
  REGISTRY.agentKeys.forEach(function(k){
    if(REGISTRY.users[k]){
      var o=document.createElement("option");
      o.value=k;o.textContent=REGISTRY.users[k].name;
      sel.appendChild(o);
    }
  });
}

// ── LOGIN ─────────────────────────────────────────────────────────────
function pinPress(d){
  if(pinBuf.length>=4)return;
  pinBuf+=String(d);
  updateDots();
  if(pinBuf.length===4)setTimeout(checkPin,150);
}
function pinBack(){pinBuf=pinBuf.slice(0,-1);updateDots();el("loginErr").textContent="";}
function updateDots(err){
  for(var i=0;i<4;i++){
    var dot=el("pd"+i);
    if(!dot)continue;
    dot.textContent=pinBuf[i]?"●":"";
    dot.className="pin-dot"+(pinBuf[i]?" filled":"")+(err?" error":"");
  }
}
function checkPin(){
  var sel=el("userSelect").value;
  if(!sel){el("loginErr").textContent="Please select your name.";pinBuf="";updateDots(true);return;}
  var u=REGISTRY.users[sel];if(!u)return;
  var s=getSettings(sel);
  var pin=s.pin||u.pin;
  if(pinBuf===pin){curUser=sel;launchApp();}
  else{el("loginErr").textContent="Incorrect PIN. Try again.";pinBuf="";updateDots(true);}
}
function resetPin(){pinBuf="";updateDots();el("loginErr").textContent="";}

// ── LAUNCH ────────────────────────────────────────────────────────────
function launchApp(){
  try{
    el("loginScreen").style.display="none";
    el("app").style.display="block";
    var u=REGISTRY.users[curUser];
    el("hdrName").textContent=u.name;
    el("hdrRole").textContent=u.role;
    if(u.master)agentTab="medz";
    REGISTRY.agentKeys.forEach(function(k){
      leadsCache[k]=loadLeadsLS(k);
      settingsCache[k]=loadSettingsLS(k);
    });
    buildNav();
    showPage("home");
    checkNotifDot();
    fbGet("registry").then(function(r){if(r&&r.users){REGISTRY=r;lsSet("sp_registry",r);buildDropdown();buildNav();}});
  }catch(e){
    el("mainContent").style.padding="20px";
    el("mainContent").innerHTML="<div style='background:#fee2e2;border-radius:10px;padding:16px;color:#dc2626;font-size:13px'><strong>App Error:</strong> "+e.message+"<br><small>"+e.stack+"</small></div>";
  }
}

// ── NAVIGATION ────────────────────────────────────────────────────────
function buildNav(){
  var isMaster=REGISTRY.users[curUser]&&REGISTRY.users[curUser].master;
  var tabs=isMaster

function buildLeadCard(l){
  var sc=l.stage.toLowerCase().replace(/ /g,"-");
  var sc2=score(l);
  var ds=daysDiff(getLc(l));
  var ageLbl=ds<1?"Today":ds===1?"1 day":ds+" days";
  var ageBg=ds<7?"#dcfce7":ds<14?"#fff3cc":"#fee2e2";
  var ageClr=ds<7?"#15803d":ds<14?"#92400e":"#dc2626";
  var scoreBg=sc2==="Hot"?"#fee2e2":sc2==="Warm"?"#fff3cc":"#e0f2fe";
  var scoreClr=sc2==="Hot"?"#dc2626":sc2==="Warm"?"#92400e":"#0369a1";
  var scoreIco=sc2==="Hot"?"&#128293;":sc2==="Warm"?"&#11088;":"&#10052;";
  var fuDue=getFuDate(l)&&daysUntil(getFuDate(l))<=1&&l.stage!=="Closed"&&l.stage!=="Rejected";
  var card=document.createElement("div");
  card.className="lead-card lc-"+sc;
  card.setAttribute("data-id",l._id);
  card.style.cursor="pointer";
  var inner="";
  inner+="<div style='display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;gap:8px'>";
  inner+="<div style='flex:1;min-width:0'><div style='font-size:15px;font-weight:600;color:#1a1e33'>"+l.name+"</div>";
  inner+="<div style='font-size:12px;color:#7a84a8;margin-top:2px'>"+(l.prof||"")+(l.pass?" &middot; "+l.pass:"")+"</div></div>";
  inner+="<span class='sb sb-"+sc+"'>"+l.stage+"</span></div>";
  inner+="<div style='display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px'>";
  inner+="<span style='font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:"+scoreBg+";color:"+scoreClr+"'>"+scoreIco+" "+sc2+"</span>";
  inner+="<span style='font-size:11px;padding:2px 8px;border-radius:20px;background:"+ageBg+";color:"+ageClr+";font-weight:500'>"+ageLbl+" ago</span>";
  if(fuDue)inner+="<span style='font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:#fff0e6;color:#f47920'>&#128197; Follow-up "+(daysUntil(getFuDate(l))<=0?"overdue":"today")+"</span>";
  if(l.income)inner+="<span style='font-size:11px;background:#eef0f6;color:#7a84a8;padding:2px 8px;border-radius:20px'>"+l.income+"</span>";
  if(l.location==="Overseas")inner+="<span style='font-size:11px;background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:20px;font-weight:600'>Overseas"+(l.country?" - "+l.country:"")+"</span>";
  if(l.source)inner+="<span style='font-size:11px;background:#eef0f6;color:#7a84a8;padding:2px 8px;border-radius:20px'>"+(l.source==="Event"&&l.event?l.event:l.source)+"</span>";
  inner+="</div>";
  inner+="<div style='display:flex;align-items:center;justify-content:space-between'>";
  inner+="<span style='font-size:12px;color:#7a84a8'>"+(l.nextAction?"&rarr; "+l.nextAction.substring(0,28):l.remarks?l.remarks.substring(0,28):"")+"</span>";
  inner+="<div style='display:flex;align-items:center;gap:8px'>";
  if(l.fyc)inner+="<span style='font-size:13px;font-weight:700;color:#16a34a'>$"+parseFloat(l.fyc).toLocaleString()+"</span>";
  if(l.phone)inner+="<button class='wa-btn' data-wa='"+l._id+"'>WA</button>";
  inner+="</div></div>";
  card.innerHTML=inner;
  card.onclick=function(e){
    var waBtn=e.target.closest("[data-wa]");
    if(waBtn){e.stopPropagation();waLead(waBtn.getAttribute("data-wa"));return;}
    openDetail(l._id);
  };
  return card;
}

function parseRefNames(str){
  if(!str)return[];
  return str.split("\n").map(function(line){
    var parts=line.split("|");
    return{name:(parts[0]||"").trim(),phone:(parts[1]||"").trim()};
  }).filter(function(r){return r.name;});
}
function isRefContacted(leads,refName){
  var done=["Contacted","Follow Up","Met","Proposed","Closed"];
  return leads.some(function(l){return l.name.toLowerCase()===refName.toLowerCase()&&done.indexOf(l.stage)>=0;});
}

function getMonthly(u){
  var leads=getLeads(u);var m={};
  leads.forEach(function(l){
    var k=l.mk||monthKey();
    if(!m[k])m[k]={fyc:0,leads:0};
    m[k].leads++;
    m[k].fyc+=getLFyc(l); // all leads with FYC
  });
  return m;
}
function chartOpts(cb){return {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:cb||null,font:{size:10}},grid:{color:"rgba(0,0,0,0.05)"}},x: {grid:{display:false},ticks:{font:{size:10}}}}};}
function buildPerfCharts(labels,fycData,leadsData,stages){
  var dollarCb=function(v){return "$"+v.toLocaleString();};
  var c1=el("fycChart");
  if(c1){
    if(charts.fyc)charts.fyc.destroy();
    charts.fyc=new Chart(c1,{
      type:"bar",
      data:{labels:labels,datasets:[{data:fycData,backgroundColor:fycData.map(function(v){return v>0?"rgba(212,160,23,0.85)":"rgba(212,160,23,0.1)";}),borderRadius:6}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:dollarCb,font:{size:10}},grid:{color:"rgba(0,0,0,0.05)"}},x:{grid:{display:false},ticks:{font:{size:10}}}}}
    });
  }
  var c2=el("leadsChart");
  if(c2){
    if(charts.leads)charts.leads.destroy();
    charts.leads=new Chart(c2,{
      type:"bar",
      data:{labels:labels,datasets:[{data:leadsData,backgroundColor:leadsData.map(function(v){return v>0?"rgba(240,165,0,0.85)":"rgba(240,165,0,0.15)";}),borderRadius:6}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{font:{size:10}},grid:{color:"rgba(0,0,0,0.05)"}},x:{grid:{display:false},ticks:{font:{size:10}}}}}
    });
  }
  var c3=el("pipeChart");
  if(c3){
    if(charts.pipe)charts.pipe.destroy();
    charts.pipe=new Chart(c3,{type:"doughnut",data:{labels:STAGES,datasets:[{data:STAGES.map(function(s){return stages[s];}),backgroundColor:["#94a3b8","#818cf8","#f0a500","#38bdf8","var(--gold)","#16a34a","#dc2626"],borderWidth:2,borderColor:"#fff"}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{font:{size:10},padding:7}}}}});
  }
}

// ── TEAM ──────────────────────────────────────────────────────────────
function renderTeam(){
  var keys=REGISTRY.agentKeys;var users=REGISTRY.users;
  var allData=keys.map(function(k){
    var leads=getLeads(k);var s=getSettings(k);
    var fyc=leads.reduce(function(a,l){return a+getLFyc(l);},0);
    var closed=leads.filter(function(l){return l.stage==="Closed";}).length;
    var active=leads.filter(function(l){return l.stage!=="Closed"&&l.stage!=="Rejected";}).length;
    var met=leads.filter(function(l){return ["Met","Proposed","Closed"].indexOf(l.stage)>=0;}).length;
    var ft=s.fycTarget||0;var pct=ft?Math.min(100,Math.round(fyc/ft*100)):0;
    return{k:k,name:users[k]?users[k].name:k,leads:leads.length,fyc:fyc,closed:closed,active:active,met:met,ft:ft,pct:pct};
  });
  var yrs=availYears();
  var mKeys=yearMonths(chartYear);
  var mLabels=mKeys.map(function(k){return monthLabel(k);});
  var teamFyc=mKeys.map(function(mk){return keys.reduce(function(s,k){var m=getMonthly(k);return s+(m[mk]?m[mk].fyc:0);},0);});
  var teamLeadsMo=mKeys.map(function(mk){return keys.reduce(function(s,k){var m=getMonthly(k);return s+(m[mk]?m[mk].leads:0);},0);});
  var totFyc=allData.reduce(function(s,a){return s+a.fyc;},0);
  var totLeads=allData.reduce(function(s,a){return s+a.leads;},0);
  var totClosed=allData.reduce(function(s,a){return s+a.closed;},0);
  var topF=allData.reduce(function(a,b){return a.fyc>=b.fyc?a:b;});
  var topL=allData.reduce(function(a,b){return a.leads>=b.leads?a:b;});
  var html="<div class='stats-grid' style='margin-bottom:13px'>";
  html+="<div class='stat-box'><div class='stat-num' style='color:#16a34a'>$"+totFyc.toLocaleString()+"</div><div class='stat-lbl'>Team FYC</div></div>";
  html+="<div class='stat-box'><div class='stat-num'>"+totLeads+"</div><div class='stat-lbl'>Total Leads</div></div>";
  html+="<div class='stat-box'><div class='stat-num'>"+totClosed+"</div><div class='stat-lbl'>Closed</div></div></div>";
  html+="<div class='chart-card'>";
  html+="<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:4px'><div style='font-size:13px;font-weight:600;color:#cccccc'>Team FYC</div>";
  html+="<select style='font-size:12px;padding:4px 8px;border:1.5px solid #d0d5e8;border-radius:6px;outline:none;font-family:inherit' onchange='changeYear(this.value)'>";
  yrs.forEach(function(y){html+="<option value='"+y+"'"+(y===chartYear?" selected":"")+">"+y+"</option>";});
  html+="</select></div><div style='position:relative;height:240px;margin-top:10px'><canvas id='teamFycChart'></canvas></div></div>";
  html+="<div class='chart-card'><div style='font-size:13px;font-weight:600;color:#3d4466;margin-bottom:4px'>Team Leads</div><div style='position:relative;height:200px;margin-top:10px'><canvas id='teamLeadsChart'></canvas></div></div>";
  html+="<div class='chart-card'><div style='font-size:13px;font-weight:600;color:#3d4466;margin-bottom:4px'>Agent FYC Comparison</div><div style='position:relative;height:240px;margin-top:10px'><canvas id='teamBarChart'></canvas></div></div>";
  html+="<div style='display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px'>";
  html+="<div style='background:#fff3cc;border-radius:9px;padding:12px 14px'><div style='font-size:11px;color:#92400e;font-weight:600;margin-bottom:4px'>Top FYC</div><div style='font-size:14px;font-weight:700;color:#102464'>"+topF.name.split(" ")[0]+"</div><div style='font-size:13px;color:#16a34a;font-weight:600'>$"+topF.fyc.toLocaleString()+"</div></div>";
  html+="<div style='background:#e8eefb;border-radius:9px;padding:12px 14px'><div style='font-size:11px;color:#1a3c8f;font-weight:600;margin-bottom:4px'>Most Active</div><div style='font-size:14px;font-weight:700;color:#102464'>"+topL.name.split(" ")[0]+"</div><div style='font-size:13px;color:#1a3c8f;font-weight:600'>"+topL.leads+" leads</div></div></div>";
  html+="<div style='font-size:11px;color:#7a84a8;margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em'>Individual Reports</div>";
  allData.forEach(function(a){
    html+="<div style='background:linear-gradient(135deg,#1a3c8f,#102464);border-radius:14px;padding:13px 15px;box-shadow:0 4px 16px rgba(26,60,143,0.25);margin-bottom:9px'>";

    html+="<div><div style='font-size:20px;font-weight:800;color:white'>"+a.active+"</div><div style='font-size:10px;color:rgba(255,255,255,0.8);margin-top:2px'>Active</div></div>";

    html+="</div>";
    if(a.ft)html+="<div style='margin-top:8px'><div style='display:flex;justify-content:space-between;font-size:11px;color:#7a84a8;margin-bottom:4px'><span>FYC Progress</span><span>"+a.pct+"%</span></div><div style='background:#eef0f6;border-radius:4px;height:6px;overflow:hidden'><div style='height:100%;background:linear-gradient(90deg,#1a3c8f,#f0a500);border-radius:4px;width:"+a.pct+"%'></div></div></div>";
    html+="</div>";
  });
  html+="<button class='btn-gold' onclick='exportAllCSV()'>Export All Team Data</button>";
  el("mainContent").innerHTML=html;
  setTimeout(function(){
    var dc2=function(v){return "$"+v.toLocaleString();};
    var c1=el("teamFycChart");
    if(c1){
      if(charts.tFyc)charts.tFyc.destroy();
      charts.tFyc=new Chart(c1,{type:"bar",data:{labels:mLabels,datasets:[{data:teamFyc,backgroundColor:"rgba(212,160,23,0.8)",borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:dc2,font:{size:10}},grid:{color:"rgba(0,0,0,0.05)"}},x:{grid:{display:false},ticks:{font:{size:10}}}}}});
    }
    var c2=el("teamLeadsChart");
    if(c2){
      if(charts.tLeads)charts.tLeads.destroy();
      charts.tLeads=new Chart(c2,{type:"bar",data:{labels:mLabels,datasets:[{data:teamLeadsMo,backgroundColor:"rgba(240,165,0,0.8)",borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{font:{size:10}},grid:{color:"rgba(0,0,0,0.05)"}},x:{grid:{display:false},ticks:{font:{size:10}}}}}});
    }
    var c3=el("teamBarChart");
    if(c3){
      if(charts.tBar)charts.tBar.destroy();
      var agentNames=allData.map(function(a){return a.name.split(" ")[0];});
      charts.tBar=new Chart(c3,{type:"bar",data:{labels:agentNames,datasets:[{label:"FYC",data:allData.map(function(a){return a.fyc;}),backgroundColor:"rgba(212,160,23,0.8)",borderRadius:6},{label:"Target",data:allData.map(function(a){return a.ft;}),backgroundColor:"rgba(240,165,0,0.4)",borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10}}}},scales:{y:{ticks:{callback:dc2,font:{size:10}},grid:{color:"rgba(0,0,0,0.05)"}},x:{grid:{display:false},ticks:{font:{size:10}}}}}});
    }
  },100);
}

function saveAllTargets(){
  REGISTRY.agentKeys.forEach(function(k){
    var fycEl=document.getElementById("tgt_fyc_"+k);

    s.leadsTarget=parseInt(leadsEl.value)||0;

  showSync("All targets saved!",true);

function saveNewAgent(){
  var name=el("a_name").value.trim();
  var key=el("a_key").value.trim().toLowerCase().replace(/\s/g,"");
  var pin=el("a_pin").value.trim();
  if(!name||!key||!pin){showSync("Please fill all fields",false,true);return;}
  if(pin.length!==4||isNaN(pin)){showSync("PIN must be 4 digits",false,true);return;}
  if(REGISTRY.users[key]){showSync("Username already exists",false,true);return;}
  REGISTRY.users[key]={name:name,role:"Financial Consultant",pin:pin,master:false};
  REGISTRY.agentKeys.push(key);
  leadsCache[key]=[];settingsCache[key]={};
  saveRegistry();closeModals();renderAdmin();buildNav();
  showSync(name+" added! PIN: "+pin,true);
}

    "<button class='btn-secondary' onclick='closeModals()'>Cancel</button>"+
    "</div>";
  el("genericModal").classList.add("open");
}
function doRemoveAgent(key){
  var name=REGISTRY.users[key]?REGISTRY.users[key].name:key;
  delete REGISTRY.users[key];
  REGISTRY.agentKeys=REGISTRY.agentKeys.filter(function(k){return k!==key;});
  if(agentTab===key)agentTab="medz";
  saveRegistry();closeModals();renderAdmin();buildNav();
  showSync(name+" removed from team",true);
}

function syncToCloud(){
  showSync("Uploading...",false);
  var keys=REGISTRY.users[curUser]&&REGISTRY.users[curUser].master?REGISTRY.agentKeys:[curUser];
  var done=0;
  fbSet("registry",REGISTRY);
  keys.forEach(function(k){
    var leads=getLeads(k);var obj={};
    leads.forEach(function(l){var id=l._fbKey||l._id;var d=Object.assign({},l);delete d._id;delete d._fbKey;obj[id]=d;});
    fbSet("leads/"+k,obj).then(function(){
      fbSet("settings/"+k,getSettings(k)).then(function(){
        done++;
        if(done===keys.length){localStorage.setItem("sp_last_sync",Date.now().toString());showSync("Synced!",true);renderSettings();}
      });
    }).catch(function(){done++;if(done===keys.length)showSync("Sync failed",false,true);});
  });
}
function loadFromCloud(){
  var isMaster=REGISTRY.users[curUser]&&REGISTRY.users[curUser].master;
  var keys=isMaster?REGISTRY.agentKeys:[curUser];
  showSync("Pulling from cloud...",false);
  var done=0;
  keys.forEach(function(k){
    fbGet("leads/"+k).then(function(data){
      if(data){
        var arr=Object.keys(data).map(function(id){
          return Object.assign({},data[id],{_id:id,_fbKey:id});
        });
        leadsCache[k]=arr;saveLeads(k,arr);
      }else{leadsCache[k]=[];saveLeads(k,[]);}
      fbGet("settings/"+k).then(function(s){
        if(s){settingsCache[k]=s;lsSet("sp_settings_"+k,s);}
        done++;
        if(done===keys.length){
          localStorage.setItem("sp_last_sync",Date.now().toString());
          showSync(isMaster?"All "+keys.length+" agents loaded!":"Your data loaded!",true);
          updateKPI();showPage(curPage);
        }
      });
    });
  });
}

// ── ALERTS ────────────────────────────────────────────────────────────
function getAlerts(){
  var leads=getLeads(uid());var alerts=[];
  leads.forEach(function(l){
    if(l.stage==="Closed"||l.stage==="Rejected")return;
    var ds=daysDiff(getLc(l));
    if(getFuDate(l)){
      var du=daysUntil(getFuDate(l));
      if(du<=0)alerts.push({type:"red",l:l,msg:"Follow-up OVERDUE by "+Math.abs(du)+" day(s)"});
      else if(du<=1)alerts.push({type:"red",l:l,msg:"Follow-up DUE TODAY"});
      else if(du<=3)alerts.push({type:"orange",l:l,msg:"Follow-up in "+du+" days"});
    }
    if(l.stage==="New Lead"&&ds>=7)alerts.push({type:"orange",l:l,msg:"New lead not contacted in "+ds+" days"});
    if(l.stage!=="New Lead"&&ds>=14&&ds<365)alerts.push({type:"orange",l:l,msg:"No contact in "+ds+" days"});
    if(ds>=365)alerts.push({type:"red",l:l,msg:"No contact in "+Math.floor(ds/30)+" months"});
  });
  return alerts;
}
function showAlerts(){
  var alerts=getAlerts();
  if(!alerts.length){showSync("No urgent alerts",true);return;}
  el("alertSub").textContent=alerts.length+" item(s) need attention";
  el("alertItems").innerHTML=alerts.map(function(a){
    var html="<div style='background:#f8f9fc;border-radius:9px;padding:12px 14px;margin-bottom:8px;border-left:4px solid "+(a.type==="red"?"#dc2626":"#f47920")+";cursor:pointer' data-alertdetail='"+a.l._id+"'>";

    html+="<div style='font-size:12px;color:#7a84a8;margin-top:3px;line-height:1.4'>"+a.msg+"</div>";
    if(a.l.nextAction)html+="<div style='font-size:11px;color:#1a3c8f;margin-top:4px;font-weight:500'>Next: "+a.l.nextAction+"</div>";

  var a=document.createElement("a");
  var u2=REGISTRY.users[uid()];
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download="smartpera_"+(u2?u2.name.replace(/ /g,"_"):"leads")+"_"+todayStr()+".csv";
  a.click();
}
function exportAllCSV(){REGISTRY.agentKeys.forEach(function(k){var tmp=uid;uid=function(){return k;};exportCSV();uid=tmp;});}

// ── MODALS ────────────────────────────────────────────────────────────
function closeModals(){document.querySelectorAll(".modal-overlay").forEach(function(m){m.classList.remove("open");});}
document.addEventListener("click",function(e){
  if(e.target&&e.target.classList&&e.target.classList.contains("modal-overlay"))closeModals();
});

// ── INIT ──────────────────────────────────────────────────────────────
function resetAllData(){
  el("genericContent").innerHTML=
    "<div class='modal-handle'></div>"+
    "<div style='text-align:center;padding:10px 0 18px'>"+
    "<div style='font-size:40px;margin-bottom:12px'>&#9888;</div>"+
    "<div class='modal-title' style='margin-bottom:8px'>Reset All Data?</div>"+
    "<div style='font-size:14px;color:#3d4466;line-height:1.6;margin-bottom:20px'>This will permanently clear ALL leads from this device.<br><strong style='color:#dc2626'>This cannot be undone.</strong></div>"+
    "<button class='btn-danger' data-confirmreset='1' style='margin-bottom:8px'>Yes, Clear All Data</button>"+
    "<button class='btn-secondary' onclick='closeModals()'>Cancel</button>"+
    "</div>";
  el("genericModal").classList.add("open");
}
function doResetAllData(){
  REGISTRY.agentKeys.forEach(function(k){
    leadsCache[k]=[];
    lsSet("sp_leads_"+k,[]);
    fbSet("leads/"+k,{});
  });
  closeModals();showSync("All data cleared",true);
  showPage("home");
}

function attachDelegation(){
  // Attached once to body at init - handles ALL clicks everywhere
}
function globalClick(e){
  var t=e.target;
  var pg=t.closest("[data-page]");if(pg){showPage(pg.getAttribute("data-page"));return;}
  var ag=t.closest("[data-agent]");if(ag){switchAgent(ag.getAttribute("data-agent"));return;}
  var wa=t.closest("[data-wa]");if(wa){e.stopPropagation();waLead(wa.getAttribute("data-wa"));return;}
  var dt=t.closest("[data-detail]");if(dt){openDetail(dt.getAttribute("data-detail"));return;}
  var ed=t.closest("[data-edit]");if(ed){openEdit(ed.getAttribute("data-edit"));return;}
  var rm=t.closest("[data-remove]");if(rm){removeAgent(rm.getAttribute("data-remove"));return;}
  var pk=t.closest("[data-pick]");if(pk){pickAC(pk.getAttribute("data-pick"));return;}
  var ad=t.closest("[data-alertdetail]");if(ad){closeAlerts();openDetail(ad.getAttribute("data-alertdetail"));return;}
  var aa=t.closest("[data-addagent]");if(aa){openAddAgent();return;}
  var cr=t.closest("[data-confirmremove]");if(cr){doRemoveAgent(cr.getAttribute("data-confirmremove"));return;}
  var rs=t.closest("[data-confirmreset]");if(rs){doResetAllData();return;}
}

function init(){
  try{
    loadRegistryLS();
    buildDropdown();
    document.body.addEventListener("click", globalClick);
    el("loadScreen").style.display="none";
    el("loginScreen").style.display="flex";
    fbGet("registry").then(function(r){if(r&&r.users){REGISTRY=r;lsSet("sp_registry",r);buildDropdown();}}).catch(function(){});
  }catch(e){
    el("loadScreen").innerHTML="<div style='color:white;padding:20px;font-size:14px'>Init error: "+e.message+"</div>";
  }
}
init();
